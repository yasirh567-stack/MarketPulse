name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint, type-check, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check app tests

      - name: Black (format check)
        run: black --check app tests

      - name: MyPy (type check)
        run: mypy app
        continue-on-error: true # best-effort per project conventions; see pyproject.toml

      - name: Pytest
        env:
          DEMO_MODE: "true"
        run: pytest -q --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (lint, type-check, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: ESLint
        run: npm run lint

      - name: Prettier (format check)
        run: npm run format:check

      - name: TypeScript type check
        run: npx tsc -b

      - name: Vitest
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: Playwright smoke test (optional)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend (demo mode)
        working-directory: backend
        env:
          DEMO_MODE: "true"
        run: |
          alembic upgrade head
          nohup uvicorn app.main:app --port 8000 > backend.log 2>&1 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 1
          done

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run dev > frontend.log 2>&1 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:5173 && break
            sleep 1
          done

      - name: Run Playwright smoke test
        working-directory: frontend
        run: npm run test:e2e
        continue-on-error: true # environment-dependent (model training timing); doesn't block merges

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
